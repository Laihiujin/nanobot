name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Python dependencies & nanobot
        run: |
          pip install pyinstaller
          pip install .

      - name: Build nanobot gateway sidecar (arm64)
        run: |
          pyinstaller scripts/nanobot-gateway.spec \
            --distpath apps/desktop/src-tauri/binaries \
            --workpath build/pyinstaller \
            --noconfirm
          mv apps/desktop/src-tauri/binaries/nanobot-gateway \
             apps/desktop/src-tauri/binaries/nanobot-gateway-aarch64-apple-darwin
          chmod +x apps/desktop/src-tauri/binaries/nanobot-gateway-aarch64-apple-darwin

      - name: Install Tauri dependencies
        working-directory: apps/desktop
        run: pnpm install

      - name: Build Tauri app (macOS arm64)
        working-directory: apps/desktop
        run: npx tauri build --bundles app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nanobot-macos-arm64
          path: |
            apps/desktop/src-tauri/target/release/bundle/macos/*.app
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Python dependencies & nanobot
        run: |
          pip install pyinstaller
          pip install .

      - name: Build nanobot gateway sidecar (Windows x64)
        run: |
          pyinstaller scripts/nanobot-gateway.spec --distpath apps/desktop/src-tauri/binaries --workpath build/pyinstaller --noconfirm
          Move-Item apps/desktop/src-tauri/binaries/nanobot-gateway.exe apps/desktop/src-tauri/binaries/nanobot-gateway-x86_64-pc-windows-msvc.exe
        shell: pwsh

      - name: Install Tauri dependencies
        working-directory: apps/desktop
        run: pnpm install

      - name: Build Tauri app (Windows x64)
        working-directory: apps/desktop
        run: npx tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nanobot-windows-x64
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: [build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
